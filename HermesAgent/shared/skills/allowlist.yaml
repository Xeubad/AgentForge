# ---------- 黑名单（无论如何不允许）----------
denylist:
  - pattern: "*remote_shell*"
    reason: "远程 shell 类一律拒"
  - pattern: "*credential_dumper*"
    reason: "凭据导出类一律拒"
  - pattern: "*keylogger*"
    reason: "键盘记录类一律拒"
  - pattern: "*self_modifying*"
    reason: "自我修改类一律拒"
  - source: "agent_authored_unreviewed"
    reason: "Agent 自创且未通过 .review 阶段的 Skill 一律拒"

