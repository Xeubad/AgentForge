# ---------- 黑名单（无论如何不允许）----------
denylist:
  - name: "*"
    source: "clawhub_unverified"
    reason: "ClawHub 未签名 Skill 一律拒绝"
  - name: "*remote_shell*"
    reason: "远程 shell 类 Skill 不进白名单"
  - name: "*credential_dumper*"
    reason: "凭据导出类 Skill 一律拒绝"
  - name: "*keylogger*"
    reason: "键盘记录类 Skill 一律拒绝"
